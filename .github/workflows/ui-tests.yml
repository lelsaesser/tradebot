name: UI Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - "dashboard/**"
      - ".github/workflows/ui-tests.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "dashboard/**"
      - ".github/workflows/ui-tests.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
